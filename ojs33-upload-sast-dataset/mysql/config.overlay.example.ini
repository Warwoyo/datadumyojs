; ---------------------------------------------------------------------------
; SAFE config overlay example for the lab target.
;
; The dataset NEVER copies a config.inc.php onto the target (spesifikasi 1 & 9.2
; step 7). This file documents the only keys that may be overlaid onto the
; target's existing config.inc.php, and only after backing it up. Connection
; secrets and files_dir are READ from the target, never imposed by the dataset.
;
; Copy the relevant lines into the target config.inc.php manually, or feed them
; to your own overlay tooling. Do not commit real secrets here.
; ---------------------------------------------------------------------------

[general]
; base_url is deployment-specific and must match the target host.
base_url = "http://localhost/ojs-330"

[security]
; Restrict host header to the lab host(s).
allowed_hosts = "[\"localhost\"]"

; The following are shown for reference ONLY. They are read from the target's
; own config.inc.php during preflight and must NOT be overwritten by the dataset:
;
; [database]
; driver       = mysqli          ; preflight requires mysqli
; host         = <target>
; name         = <target DB>
; username     = <target user>
; password     = <target secret> ; never stored in this dataset
;
; [files]
; files_dir    = <target FILES_DIR, must be OUTSIDE the OJS app dir>
; public_files_dir = <target public dir>
